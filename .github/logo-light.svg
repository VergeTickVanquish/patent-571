<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="100%">
  <style>
    :root {
      --bg: #f4f5f7;
      --accent: #007a99;
      --muted: #686f80;
      --primary: #0f1115;
      --saturated: #e11d48;
      --crowded: #d97706;
      --open: #16a34a;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .font-mono {
      font-family: 'SF Mono', Monaco, Consolas, 'Fira Code', 'Courier New', monospace;
    }

    .anim-blink {
      animation: blink 1s step-end infinite;
    }
  </style>

  <rect width="100%" height="100%" fill="var(--bg)" rx="8" />

  <circle cx="30" cy="25" r="6" fill="var(--saturated)" />
  <circle cx="50" cy="25" r="6" fill="var(--crowded)" />
  <circle cx="70" cy="25" r="6" fill="var(--open)" />

  <text x="110" y="29" class="font-mono" font-size="12px" fill="var(--muted)" letter-spacing="1">
    local-crates / <tspan fill="var(--accent)">prior-art-search</tspan>
  </text>

  <g transform="translate(50, 115)">
    <text x="0" y="0" class="font-mono" font-weight="bold" font-size="54px" fill="var(--accent)">$ </text>
    <text x="60" y="-4" class="font-mono" font-weight="900" font-size="68px" fill="var(--primary)" letter-spacing="-2">
      patent<tspan fill="var(--accent)" class="anim-blink">█</tspan>
    </text>
  </g>

  <rect x="786" y="45" width="4" height="90" fill="var(--muted)" opacity="0.15" rx="2"/>
  <rect x="786" y="65" width="4" height="35" fill="var(--accent)" rx="2"/>
</svg>
