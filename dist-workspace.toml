[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Intel macOS and Windows are omitted: the onnxruntime build pulled in by
# fastembed has no Intel-macOS prebuilt and fails to link on MSVC. Those
# platforms install via `cargo install patent`.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]

# Build the Linux targets on a newer image: the onnxruntime prebuilt needs
# glibc >= 2.38, which the default image is too old for.
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-24.04"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
